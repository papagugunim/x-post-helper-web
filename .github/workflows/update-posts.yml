name: Update Posts

on:
  schedule:
    - cron: '0 4 * * *'    # 07:00 MSK
    - cron: '30 7 * * *'   # 10:30 MSK
    - cron: '30 9 * * *'   # 12:30 MSK
    - cron: '30 13 * * *'  # 16:30 MSK
    - cron: '0 16 * * *'   # 19:00 MSK
    - cron: '0 19 * * *'   # 22:00 MSK
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-posts.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git diff --staged --quiet || git commit -m "chore: update posts"
          git push
